<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NovaPOS - Toko Kelontong</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --glass-dark: rgba(15, 17, 26, 0.82);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bg-dark: #0b0c10;
            --text-dim: #c5c6c7;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-dim);
            -webkit-font-smoothing: antialiased;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(0, 242, 255, 0.03) 0%, transparent 25%),
                radial-gradient(circle at 100% 100%, rgba(188, 19, 254, 0.03) 0%, transparent 25%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; }

        .glass {
            background-color: var(--glass-dark);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
        }

        .futuristic-card {
            background-color: var(--glass-dark);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .futuristic-card:hover {
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
            border-color: rgba(0, 242, 255, 0.4);
        }

        .btn-primary {
            background-color: var(--neon-cyan);
            color: black;
            font-weight: 700;
            padding: 0.5rem 1.5rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: none;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: white;
            box-shadow: 0 0 20px #00f2ff;
            transform: scale(1.02);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-outline {
            border: 1px solid var(--glass-border);
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            border: none;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(0, 242, 255, 0.2);
            border-top-color: var(--neon-cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--glass-dark);
            backdrop-filter: blur(20px);
            border-left: 4px solid var(--neon-cyan);
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            animation: slideIn 0.3s ease;
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; z-index: 200; transition: transform 0.3s; width: 260px; background: linear-gradient(180deg, #0f111a 0%, #0b0c10 100%); height: 100vh; overflow-y: auto; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0 !important; }
            .pos-layout { flex-direction: column; }
            .menu-toggle { display: block !important; }
        }

        @media (min-width: 769px) {
            .menu-toggle { display: none !important; }
        }
    </style>
</head>
<body>

<div id="app">
    <div id="loadingOverlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px;">
        <div class="spinner"></div>
        <p style="color:var(--neon-cyan)">Menghubungkan ke Database...</p>
        <p id="loadingStatus" style="font-size:12px; color:#888">Inisialisasi...</p>
    </div>

    <aside id="sidebar" class="sidebar" style="position:fixed; left:0; top:0; width:260px; height:100vh; background:linear-gradient(180deg, #0f111a 0%, #0b0c10 100%); border-right:1px solid var(--glass-border); z-index:100; transition:transform 0.3s; overflow-y:auto;">
        <div style="padding:24px 20px; border-bottom:1px solid var(--glass-border);">
            <div style="display:flex; align-items:center; gap:12px;">
                <div style="width:40px; height:40px; background:var(--neon-cyan); border-radius:12px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 15px rgba(0,242,255,0.5);">
                    <span style="font-size:20px;">🏪</span>
                </div>
                <div>
                    <h1 style="font-size:18px; font-weight:700; color:white;">NovaPOS</h1>
                    <p style="font-size:10px; color:var(--neon-cyan); text-transform:uppercase; letter-spacing:1px;">Systems V2.0</p>
                </div>
            </div>
        </div>
        <nav style="padding:20px 16px;">
            <div style="margin-bottom:24px;">
                <p style="font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#666; margin-bottom:12px; padding-left:12px;">Menu Utama</p>
                <button onclick="showView('pos')" id="nav-pos" class="nav-item" style="width:100%; display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:10px; background:none; color:#c5c6c7; cursor:pointer; margin-bottom:4px; transition:all 0.2s;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/></svg>
                    <span>POS Transaksi</span>
                </button>
                <button onclick="showView('products')" id="nav-products" class="nav-item" style="width:100%; display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:10px; background:none; color:#c5c6c7; cursor:pointer; margin-bottom:4px;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                    <span>Master Barang</span>
                </button>
                <button onclick="showView('stock')" id="nav-stock" class="nav-item" style="width:100%; display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:10px; background:none; color:#c5c6c7; cursor:pointer; margin-bottom:4px;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    <span>Restock</span>
                </button>
                <button onclick="showView('transactions')" id="nav-transactions" class="nav-item" style="width:100%; display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:10px; background:none; color:#c5c6c7; cursor:pointer; margin-bottom:4px;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                    <span>Riwayat Transaksi</span>
                </button>
                <button onclick="showView('customers')" id="nav-customers" class="nav-item" style="width:100%; display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:10px; background:none; color:#c5c6c7; cursor:pointer; margin-bottom:4px;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    <span>Pelanggan</span>
                </button>
                <button onclick="showView('suppliers')" id="nav-suppliers" class="nav-item" style="width:100%; display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:10px; background:none; color:#c5c6c7; cursor:pointer; margin-bottom:4px;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 18l4-4 4 4m0-8v4m4 0a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    <span>Supplier</span>
                </button>
                <button onclick="showView('expenses')" id="nav-expenses" class="nav-item" style="width:100%; display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:10px; background:none; color:#c5c6c7; cursor:pointer; margin-bottom:4px;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                    <span>Pengeluaran</span>
                </button>
            </div>
        </nav>
        <div style="padding:20px; margin-top:auto; border-top:1px solid var(--glass-border);">
            <div class="glass" style="padding:12px;">
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
                    <div id="dbStatusDot" style="width:8px; height:8px; border-radius:50%; background:#666;"></div>
                    <span id="dbStatusText" style="font-size:10px;">Memuat...</span>
                </div>
                <p style="font-size:10px; color:#666;">Data tersimpan di Google Sheets</p>
            </div>
        </div>
    </aside>

    <div id="sidebarOverlay" onclick="closeSidebar()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99;"></div>

    <main id="mainContent" style="margin-left:260px; min-height:100vh; transition:margin-left 0.3s;">
        <header style="background:var(--glass-dark); backdrop-filter:blur(20px); border-bottom:1px solid var(--glass-border); padding:16px 32px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50;">
            <div style="display:flex; align-items:center; gap:16px;">
                <button onclick="toggleSidebar()" id="menuToggle" class="menu-toggle" style="background:none; border:none; cursor:pointer;">
                    <svg width="24" height="24" fill="none" stroke="white" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <h2 id="pageTitle" style="font-size:20px; font-weight:700; color:white;">POS Transaksi</h2>
            </div>
            <div style="display:flex; align-items:center; gap:16px;">
                <span id="currentDate" style="font-size:12px; color:#888;"></span>
            </div>
        </header>

        <div style="padding:24px 32px;">
            <div id="view-pos" class="view" style="display:block;"></div>
            <div id="view-products" class="view" style="display:none;"></div>
            <div id="view-stock" class="view" style="display:none;"></div>
            <div id="view-transactions" class="view" style="display:none;"></div>
            <div id="view-customers" class="view" style="display:none;"></div>
            <div id="view-suppliers" class="view" style="display:none;"></div>
            <div id="view-expenses" class="view" style="display:none;"></div>
        </div>
    </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
    // ============================================
    // KONFIGURASI - URL WEB APP ANDA
    // ============================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwkC8rnCnUjwgWPPj7WE3p6-3Fl36bElA_Tymjp2yTyvg09JRGtP4OyAk86k1w71-YnjA/exec';
    // ============================================

    let products = [];
    let customers = [];
    let suppliers = [];
    let transactions = [];
    let restocks = [];
    let expenses = [];
    let cart = [];
    let currentView = 'pos';
    let isConnected = false;
    let selectedPayment = 'TUNAI';

    async function callAPI(action, data = null) {
        const payload = { action };
        if (data) payload.data = data;

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });
            
            if (response.ok) {
                const result = await response.json();
                return result;
            } else {
                throw new Error('HTTP ' + response.status);
            }
        } catch (err) {
            console.warn('POST failed:', err);
            return { success: false, error: err.message };
        }
    }

    async function loadAllData() {
        updateLoadingStatus('Mengambil data produk...');
        const productsRes = await callAPI('getProducts');
        if (productsRes.success && productsRes.data) {
            products = productsRes.data;
            updateLoadingStatus(`✓ ${products.length} produk dimuat`);
        }

        updateLoadingStatus('Mengambil data pelanggan...');
        const customersRes = await callAPI('getCustomers');
        if (customersRes.success && customersRes.data) {
            customers = customersRes.data;
            updateLoadingStatus(`✓ ${customers.length} pelanggan dimuat`);
        }

        updateLoadingStatus('Mengambil data supplier...');
        const suppliersRes = await callAPI('getSuppliers');
        if (suppliersRes.success && suppliersRes.data) {
            suppliers = suppliersRes.data;
            updateLoadingStatus(`✓ ${suppliers.length} supplier dimuat`);
        }

        updateLoadingStatus('Mengambil data transaksi...');
        const transactionsRes = await callAPI('getTransactions');
        if (transactionsRes.success && transactionsRes.data) {
            transactions = transactionsRes.data;
            updateLoadingStatus(`✓ ${transactions.length} transaksi dimuat`);
        }

        updateLoadingStatus('Mengambil data restock...');
        const restocksRes = await callAPI('getRestocks');
        if (restocksRes.success && restocksRes.data) {
            restocks = restocksRes.data;
            updateLoadingStatus(`✓ ${restocks.length} restock dimuat`);
        }

        updateLoadingStatus('Mengambil data pengeluaran...');
        const expensesRes = await callAPI('getExpenses');
        if (expensesRes.success && expensesRes.data) {
            expenses = expensesRes.data;
            updateLoadingStatus(`✓ ${expenses.length} pengeluaran dimuat`);
        }

        isConnected = true;
        document.getElementById('dbStatusDot').style.background = '#10b981';
        document.getElementById('dbStatusText').innerHTML = 'Terhubung ke Google Sheets';
    }

    function formatCurrency(num) {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num);
    }

    function formatDate(dateStr) {
        if (!dateStr) return '-';
        const d = new Date(dateStr);
        return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#00f2ff';
        toast.innerHTML = `<span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(100px)';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    function updateLoadingStatus(msg) {
        const el = document.getElementById('loadingStatus');
        if (el) el.textContent = msg;
    }

    function updateCurrentDate() {
        const now = new Date();
        document.getElementById('currentDate').textContent = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }

    function showView(view) {
        currentView = view;
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(`view-${view}`).style.display = 'block';
        
        const titles = { 
            pos: 'POS Transaksi', 
            products: 'Master Barang', 
            stock: 'Restock Barang',
            transactions: 'Riwayat Transaksi',
            customers: 'Data Pelanggan', 
            suppliers: 'Data Supplier',
            expenses: 'Pengeluaran Operasional'
        };
        document.getElementById('pageTitle').textContent = titles[view];
        
        document.querySelectorAll('.nav-item').forEach(nav => {
            nav.style.background = 'none';
            nav.style.color = '#c5c6c7';
        });
        const activeNav = document.getElementById(`nav-${view}`);
        if (activeNav) {
            activeNav.style.background = 'rgba(0, 242, 255, 0.1)';
            activeNav.style.color = '#00f2ff';
        }
        
        if (view === 'pos') renderPOS();
        else if (view === 'products') renderProducts();
        else if (view === 'stock') renderStock();
        else if (view === 'transactions') renderTransactions();
        else if (view === 'customers') renderCustomers();
        else if (view === 'suppliers') renderSuppliers();
        else if (view === 'expenses') renderExpenses();
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.toggle('open');
        overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').style.display = 'none';
    }

    // ========== POS ==========
    function renderPOS() {
        const container = document.getElementById('view-pos');
        container.innerHTML = `
            <div style="display:flex; gap:24px; flex-wrap:wrap;">
                <div style="flex:1.2; min-width:300px;">
                    <div class="futuristic-card">
                        <h3 style="color:white; margin-bottom:16px;">🛒 Keranjang Belanja</h3>
                        <div id="cartItems" style="max-height:400px; overflow-y:auto; margin-bottom:16px;"></div>
                        <div style="border-top:1px solid var(--glass-border); padding-top:16px;">
                            <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                                <span>Subtotal</span>
                                <span id="cartSubtotal">Rp 0</span>
                            </div>
                            <div style="display:flex; justify-content:space-between; margin-bottom:16px; font-size:20px; font-weight:bold;">
                                <span>TOTAL</span>
                                <span id="cartTotal" style="color:var(--neon-cyan);">Rp 0</span>
                            </div>
                            <div style="display:flex; gap:12px;">
                                <button onclick="clearCart()" class="btn-outline" style="flex:1;">Kosongkan</button>
                                <button onclick="processCheckout()" id="checkoutBtn" class="btn-primary" style="flex:2;" disabled>Bayar</button>
                            </div>
                        </div>
                    </div>
                    <div class="futuristic-card" style="margin-top:16px;">
                        <h3 style="color:white; margin-bottom:16px;">💰 Metode Pembayaran</h3>
                        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px;">
                            <button onclick="selectPayment('TUNAI')" id="pay-tunai" class="payment-method" style="padding:12px; background:rgba(0,242,255,0.1); border:1px solid var(--neon-cyan); border-radius:10px; color:var(--neon-cyan); cursor:pointer;">💵 Tunai</button>
                            <button onclick="selectPayment('QRIS')" id="pay-qris" class="payment-method" style="padding:12px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:10px; color:white; cursor:pointer;">📱 QRIS</button>
                            <button onclick="selectPayment('TRANSFER')" id="pay-transfer" class="payment-method" style="padding:12px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:10px; color:white; cursor:pointer;">🏦 Transfer</button>
                        </div>
                    </div>
                </div>
                <div style="flex:2; min-width:300px;">
                    <div class="glass" style="padding:16px; margin-bottom:16px;">
                        <input type="text" id="productSearch" placeholder="Cari produk (Nama / Kode)..." oninput="filterProducts()" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:10px; padding:12px 16px; color:white; outline:none;">
                    </div>
                    <div id="productGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:16px; max-height:calc(100vh - 280px); overflow-y:auto;"></div>
                </div>
            </div>
        `;
        renderCart();
        renderProductGrid();
        updateCheckoutButton();
    }

    function selectPayment(method) {
        selectedPayment = method;
        document.querySelectorAll('.payment-method').forEach(el => {
            el.style.background = 'rgba(255,255,255,0.05)';
            el.style.borderColor = 'var(--glass-border)';
            el.style.color = 'white';
        });
        const activeBtn = document.getElementById(`pay-${method.toLowerCase()}`);
        if (activeBtn) {
            activeBtn.style.background = 'rgba(0,242,255,0.1)';
            activeBtn.style.borderColor = 'var(--neon-cyan)';
            activeBtn.style.color = 'var(--neon-cyan)';

    function addToCart(product) {
        if (product.stok_saat_ini <= 0) {
            showToast('Stok habis!', 'error');
            return;
        }
        const existing = cart.find(c => c.kode_barang === product.kode_barang);
        if (existing) {
            if (existing.qty >= product.stok_saat_ini) {
                showToast('Stok tidak mencukupi!', 'error');
                return;
            }
            existing.qty++;
            existing.subtotal = existing.qty * existing.harga_jual;
        } else {
            cart.push({
                kode_barang: product.kode_barang,
                nama_barang: product.nama_barang,
                harga_jual: product.harga_jual,
                qty: 1,
                subtotal: product.harga_jual,
                stok: product.stok_saat_ini
            });
        }
        renderCart();
        updateCheckoutButton();
    }

    function updateCartQty(kode, delta) {
        const item = cart.find(c => c.kode_barang === kode);
        if (item) {
            const newQty = item.qty + delta;
            if (newQty <= 0) {
                cart = cart.filter(c => c.kode_barang !== kode);
            } else if (newQty <= item.stok) {
                item.qty = newQty;
                item.subtotal = item.qty * item.harga_jual;
            } else {
                showToast('Stok tidak mencukupi!', 'error');
            }
        }
        renderCart();
        updateCheckoutButton();
    }

    function removeFromCart(kode) {
        cart = cart.filter(c => c.kode_barang !== kode);
        renderCart();
        updateCheckoutButton();
    }

    function clearCart() {
        cart = [];

    async function processCheckout() {
        if (cart.length === 0) return;
        
        const now = new Date();
        const tanggal = now.toISOString().split('T')[0];
        const jam = now.toTimeString().split(' ')[0].substring(0,5);
        const invoice = `INV-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
        
        const total = cart.reduce((s, c) => s + c.subtotal, 0);
        
        for (const item of cart) {
            const transaction = {
                tanggal: tanggal,
                jam: jam,
                no_invoice: invoice,
                kode_barang: item.kode_barang,
                nama_barang: item.nama_barang,
                harga_jual: item.harga_jual,
                jumlah_beli: item.qty,
                total_harga: item.subtotal,
                metode_bayar: selectedPayment,
                kasir: 'Admin'
            };
            
            const result = await callAPI('addTransaction', transaction);
            if (!result.success) {
                showToast('Gagal menyimpan transaksi', 'error');
                return;
            }
            
            // Update stock
            const product = products.find(p => p.kode_barang === item.kode_barang);
            if (product) {
                const newStock = product.stok_saat_ini - item.qty;
                await callAPI('updateStock', { kode_barang: item.kode_barang, stok: newStock });
            }
        }
        
        showToast(`✅ Transaksi berhasil! Total: ${formatCurrency(total)}`);
        cart = [];
        await loadAllData();
        renderCart();
        renderProductGrid();
        updateCheckoutButton();
        renderTransactions();
    }

        tbody.innerHTML = transactions.map(t => `
            <tr style="border-bottom:1px solid var(--glass-border);">
                <td style="padding:12px;">${t.tanggal || '-'}</td>
                <td style="padding:12px;">${t.jam || '-'}</td>
                <td style="padding:12px;">${t.no_invoice || '-'}</td>
                <td style="padding:12px;">${t.nama_barang || '-'}</td>
                <td style="padding:12px;">${t.jumlah_beli || 0}</td>
                <td style="padding:12px; color:var(--neon-cyan);">${formatCurrency(t.total_harga)}</td>
                <td style="padding:12px;">${t.metode_bayar || '-'}</td>
                <td style="padding:12px;">${t.kasir || '-'}</td>
            </tr>
        `).join('');

    // ========== CUSTOMERS ==========
    function renderCustomers() {
        const container = document.getElementById('view-customers');
        container.innerHTML = `
            <div class="futuristic-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3 style="color:white;">👥 Data Pelanggan</h3>
                    <button class="btn-primary" onclick="openCustomerModal()">+ Tambah Pelanggan</button>
                </div>
                <div id="customersList"></div>
            </div>
        `;
        renderCustomersList();
    }

    function renderCustomersList() {
        const container = document.getElementById('customersList');
        if (!container) return;
        
        if (customers.length === 0) {
            container.innerHTML = '<p style="text-align:center; padding:40px;">Tidak ada data pelanggan</p>';
            return;
        }
        
        container.innerHTML = customers.map(c => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid var(--glass-border);">
                <div>
                    <p style="color:white; font-weight:500;">${c.nama}</p>
                    <p style="font-size:12px;">📞 ${c.no_wa || '-'} | 📍 ${c.alamat || '-'}</p>
                    <p style="font-size:11px; color:#888;">${c.catatan || ''}</p>
                </div>
                <div>
                    <button onclick="editCustomer('${c.nama}')" style="background:rgba(0,242,255,0.1); border:none; padding:6px 12px; border-radius:6px; color:var(--neon-cyan); cursor:pointer;">✏️</button>
                    <button onclick="deleteCustomer('${c.nama}')" style="background:rgba(239,68,68,0.1); border:none; padding:6px 12px; border-radius:6px; color:#ef4444; cursor:pointer; margin-left:8px;">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    function openCustomerModal(editNama = null) {
        const customer = editNama ? customers.find(c => c.nama === editNama) : null;
        const modalHtml = `
            <div id="customerModal" class="modal-overlay active">
                <div class="modal-content glass" style="max-width:500px; padding:24px;">
                    <h3 style="color:white; margin-bottom:20px;">${customer ? 'Edit Pelanggan' : 'Tambah Pelanggan'}</h3>
                    <form id="customerForm" onsubmit="saveCustomer(event)">
                        <input type="hidden" id="editNama" value="${customer ? customer.nama : ''}">
                        <div style="margin-bottom:16px;">
                            <label style="font-size:12px;">Nama Lengkap</label>
                            <input type="text" id="customerNama" required value="${customer ? customer.nama : ''}" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">
                        </div>
                        <div style="margin-bottom:16px;">
                            <label style="font-size:12px;">No. WhatsApp</label>
                            <input type="text" id="customerWa" value="${customer ? customer.no_wa || '' : ''}" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">
                        </div>
                        <div style="margin-bottom:16px;">
                            <label style="font-size:12px;">Alamat</label>
                            <textarea id="customerAlamat" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">${customer ? customer.alamat || '' : ''}</textarea>
                        </div>
                        <div style="margin-bottom:24px;">
                            <label style="font-size:12px;">Catatan</label>
                            <input type="text" id="customerCatatan" value="${customer ? customer.catatan || '' : ''}" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">
                        </div>
                        <div style="display:flex; gap:12px;">
                            <button type="button" onclick="closeModal('customerModal')" class="btn-outline" style="flex:1;">Batal</button>
                            <button type="submit" class="btn-primary" style="flex:2;">Simpan</button>
                        </div>
                    </form>
                </div>
            </div>
        `;
        const existing = document.getElementById('customerModal');
        if (existing) existing.remove();
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    async function saveCustomer(e) {
        e.preventDefault();
        const editNama = document.getElementById('editNama').value;
        const customerData = {
            nama: document.getElementById('customerNama').value,
            no_wa: document.getElementById('customerWa').value,
            alamat: document.getElementById('customerAlamat').value,
            catatan: document.getElementById('customerCatatan').value
        };
        
        let result;
        if (editNama) {
            customerData.old_nama = editNama;
            result = await callAPI('updateCustomer', customerData);
        } else {
            result = await callAPI('addCustomer', customerData);
        }
        
        if (result.success) {
            showToast(editNama ? 'Pelanggan diperbarui' : 'Pelanggan ditambahkan');
            await loadAllData();
            renderCustomersList();
            closeModal('customerModal');
        } else {
            showToast('Gagal menyimpan', 'error');
        }
    }

    async function deleteCustomer(nama) {
        if (confirm('Yakin ingin menghapus pelanggan ini?')) {
            const result = await callAPI('deleteCustomer', { nama: nama });
            if (result.success) {
                showToast('Pelanggan dihapus');
                await loadAllData();
                renderCustomersList();
            } else {
                showToast('Gagal menghapus', 'error');
            }
        }
    }

    function editCustomer(nama) {
        openCustomerModal(nama);
    }

    // ========== SUPPLIERS ==========
    function renderSuppliers() {
        const container = document.getElementById('view-suppliers');
        container.innerHTML = `
            <div class="futuristic-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3 style="color:white;">🚚 Data Supplier</h3>
                    <button class="btn-primary" onclick="openSupplierModal()">+ Tambah Supplier</button>
                </div>
                <div id="suppliersList"></div>
            </div>
        `;
        renderSuppliersList();
    }

    function renderSuppliersList() {
        const container = document.getElementById('suppliersList');
        if (!container) return;
        
        if (suppliers.length === 0) {
            container.innerHTML = '<p style="text-align:center; padding:40px;">Tidak ada data supplier</p>';
            return;
        }
        
        container.innerHTML = suppliers.map(s => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:12px; border-bottom:1px solid var(--glass-border);">
                <div>
                    <p style="color:white; font-weight:500;">${s.nama}</p>
                    <p style="font-size:12px;">📞 ${s.kontak || '-'} | 📍 ${s.alamat || '-'}</p>
                    <p style="font-size:11px; color:#888;">${s.catatan || ''}</p>
                </div>
                <div>
                    <button onclick="editSupplier('${s.nama}')" style="background:rgba(0,242,255,0.1); border:none; padding:6px 12px; border-radius:6px; color:var(--neon-cyan); cursor:pointer;">✏️</button>
                    <button onclick="deleteSupplier('${s.nama}')" style="background:rgba(239,68,68,0.1); border:none; padding:6px 12px; border-radius:6px; color:#ef4444; cursor:pointer; margin-left:8px;">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    function openSupplierModal(editNama = null) {
        const supplier = editNama ? suppliers.find(s => s.nama === editNama) : null;
        const modalHtml = `
            <div id="supplierModal" class="modal-overlay active">
                <div class="modal-content glass" style="max-width:500px; padding:24px;">
                    <h3 style="color:white; margin-bottom:20px;">${supplier ? 'Edit Supplier' : 'Tambah Supplier'}</h3>
                    <form id="supplierForm" onsubmit="saveSupplier(event)">
                        <input type="hidden" id="editSupplierNama" value="${supplier ? supplier.nama : ''}">
                        <div style="margin-bottom:16px;">
                            <label style="font-size:12px;">Nama Supplier</label>
                            <input type="text" id="supplierNama" required value="${supplier ? supplier.nama : ''}" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">
                        </div>
                        <div style="margin-bottom:16px;">
                            <label style="font-size:12px;">Alamat</label>
                            <textarea id="supplierAlamat" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">${supplier ? supplier.alamat || '' : ''}</textarea>
                        </div>
                        <div style="margin-bottom:16px;">
                            <label style="font-size:12px;">Kontak</label>
                            <input type="text" id="supplierKontak" value="${supplier ? supplier.kontak || '' : ''}" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">
                        </div>
                        <div style="margin-bottom:24px;">
                            <label style="font-size:12px;">Catatan</label>
                            <input type="text" id="supplierCatatan" value="${supplier ? supplier.catatan || '' : ''}" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">
                        </div>
                        <div style="display:flex; gap:12px;">
                            <button type="button" onclick="closeModal('supplierModal')" class="btn-outline" style="flex:1;">Batal</button>
                            <button type="submit" class="btn-primary" style="flex:2;">Simpan</button>
                        </div>
                    </form>
                </div>
            </div>
        `;
        const existing = document.getElementById('supplierModal');
        if (existing) existing.remove();
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    async function saveSupplier(e) {
        e.preventDefault();
        const editNama = document.getElementById('editSupplierNama').value;
        const supplierData = {
            nama: document.getElementById('supplierNama').value,
            alamat: document.getElementById('supplierAlamat').value,
            kontak: document.getElementById('supplierKontak').value,
            catatan: document.getElementById('supplierCatatan').value
        };
        
        let result;
        if (editNama) {
            supplierData.old_nama = editNama;
            result = await callAPI('updateSupplier', supplierData);
        } else {
            result = await callAPI('addSupplier', supplierData);
        }
        
        if (result.success) {
            showToast(editNama ? 'Supplier diperbarui' : 'Supplier ditambahkan');
            await loadAllData();
            renderSuppliersList();
            closeModal('supplierModal');
        } else {
            showToast('Gagal menyimpan', 'error');
        }
    }

    async function deleteSupplier(nama) {
        if (confirm('Yakin ingin menghapus supplier ini?')) {
            const result = await callAPI('deleteSupplier', { nama: nama });
            if (result.success) {
                showToast('Supplier dihapus');
                await loadAllData();
                renderSuppliersList();
            } else {
                showToast('Gagal menghapus', 'error');
            }
        }
    }

    function editSupplier(nama) {
        openSupplierModal(nama);
    }

    // ========== EXPENSES ==========
    function renderExpenses() {
        const container = document.getElementById('view-expenses');
        container.innerHTML = `
            <div class="futuristic-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3 style="color:white;">💰 Pengeluaran Operasional</h3>
                    <button class="btn-primary" onclick="openExpenseModal()">+ Tambah Pengeluaran</button>
                </div>
                <div style="overflow-x:auto;">
                    <table style="width:100%; border-collapse:collapse;">
                        <thead><tr style="border-bottom:1px solid var(--glass-border);">
                            <th style="padding:12px;">Tanggal</th><th style="padding:12px;">Kategori</th>
                            <th style="padding:12px;">Keterangan</th><th style="padding:12px;">Jumlah</th>
                            <th style="padding:12px;">Bukti</th><th style="padding:12px;">Aksi</th>
                        </tr></thead>
                        <tbody id="expensesList"></tbody>
                    </table>
                </div>
            </div>
        `;
        renderExpensesList();
    }

    function renderExpensesList() {
        const tbody = document.getElementById('expensesList');
        if (!tbody) return;
        
        if (expenses.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="padding:40px; text-align:center;">Belum ada data pengeluaran</td></tr>';
            return;
        }
        
        tbody.innerHTML = expenses.map(e => `
            <tr style="border-bottom:1px solid var(--glass-border);">
                <td style="padding:12px;">${e.tanggal || '-'}</td>
                <td style="padding:12px;">${e.kategori || '-'}</td>
                <td style="padding:12px;">${e.keterangan || '-'}</td>
                <td style="padding:12px; color:var(--neon-cyan);">${formatCurrency(e.jumlah_uang)}</td>
                <td style="padding:12px;">${e.bukti || '-'}</td>
                <td style="padding:12px;">
                    <button onclick="deleteExpense('${e.tanggal}', '${e.keterangan}')" style="background:rgba(239,68,68,0.1); border:none; padding:6px 12px; border-radius:6px; color:#ef4444; cursor:pointer;">🗑️</button>
                </td>
            </tr>
        `).join('');
    }

    function openExpenseModal() {
        const modalHtml = `
            <div id="expenseModal" class="modal-overlay active">
                <div class="modal-content glass" style="max-width:500px; padding:24px;">
                    <h3 style="color:white; margin-bottom:20px;">Tambah Pengeluaran</h3>
                    <form id="expenseForm" onsubmit="saveExpense(event)">
                        <div style="margin-bottom:16px;">
                            <label style="font-size:12px;">Tanggal</label>
                            <input type="date" id="expenseTanggal" required value="${new Date().toISOString().split('T')[0]}" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">
                        </div>
                        <div style="margin-bottom:16px;">
                            <label style="font-size:12px;">Kategori</label>
                            <input type="text" id="expenseKategori" required placeholder="Listrik, Air, Sewa, dll" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">
                        </div>
                        <div style="margin-bottom:16px;">
                            <label style="font-size:12px;">Keterangan</label>
                            <input type="text" id="expenseKeterangan" required style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">
                        </div>
                        <div style="margin-bottom:16px;">
                            <label style="font-size:12px;">Jumlah Uang</label>
                            <input type="number" id="expenseJumlah" required min="0" step="1000" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">
                        </div>
                        <div style="margin-bottom:24px;">
                            <label style="font-size:12px;">Bukti (Struk/Nota)</label>
                            <input type="text" id="expenseBukti" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;" placeholder="Struk Ada / Tidak Ada">
                        </div>
                        <div style="display:flex; gap:12px;">
                            <button type="button" onclick="closeModal('expenseModal')" class="btn-outline" style="flex:1;">Batal</button>
                            <button type="submit" class="btn-primary" style="flex:2;">Simpan</button>
                        </div>
                    </form>
                </div>
            </div>
        `;
        const existing = document.getElementById('expenseModal');
        if (existing) existing.remove();
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    async function saveExpense(e) {
        e.preventDefault();
        const expenseData = {
            tanggal: document.getElementById('expenseTanggal').value,
            kategori: document.getElementById('expenseKategori').value,
            keterangan: document.getElementById('expenseKeterangan').value,
            jumlah_uang: parseInt(document.getElementById('expenseJumlah').value) || 0,
            bukti: document.getElementById('expenseBukti').value
        };
        
        const result = await callAPI('addExpense', expenseData);
        
        if (result.success) {
            showToast('Pengeluaran ditambahkan');
            await loadAllData();
            renderExpensesList();
            closeModal('expenseModal');
        } else {
            showToast('Gagal menyimpan', 'error');
        }
    }

    async function deleteExpense(tanggal, keterangan) {
        if (confirm('Yakin ingin menghapus data pengeluaran ini?')) {
            const result = await callAPI('deleteExpense', { tanggal: tanggal, keterangan: keterangan });
            if (result.success) {
                showToast('Pengeluaran dihapus');
                await loadAllData();
                renderExpensesList();
            } else {
                showToast('Gagal menghapus', 'error');
            }
        }
    }

    // ========== INIT ==========
    async function init() {
        updateCurrentDate();
        setInterval(updateCurrentDate, 60000);
        
        await loadAllData();
        
        if (window.innerWidth <= 768) {
            document.getElementById('mainContent').style.marginLeft = '0';
        }
        
        document.getElementById('loadingOverlay').style.display = 'none';
        showView('pos');
    }

    window.addEventListener('resize', () => {
        if (window.innerWidth <= 768) {
            document.getElementById('mainContent').style.marginLeft = '0';
        } else {
            document.getElementById('mainContent').style.marginLeft = '260px';
            closeSidebar();
        }
    });
    
    init();
</script>
</body>
</html>
