<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Toko Kelontong</title>
  <style>
    :root { --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --primary: #2563eb; --danger: #dc2626; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 20px; max-width: 1100px; margin: 0 auto; }
    header { margin-bottom: 25px; }
    h1 { font-size: 1.8rem; margin-bottom: 5px; }
    #last-updated { color: #64748b; font-size: 0.9rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 25px; }
    .card { background: var(--card); padding: 18px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); border-left: 4px solid var(--primary); }
    .card.warning { border-left-color: var(--danger); }
    .card h3 { font-size: 0.85rem; color: #64748b; margin-bottom: 8px; font-weight: 500; }
    .card span { font-size: 1.6rem; font-weight: 700; }
    section { background: var(--card); padding: 18px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
    h2 { font-size: 1.2rem; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
    th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    th { background: #f1f5f9; font-weight: 600; color: #475569; }
    .text-danger { color: var(--danger); font-weight: 600; }
    #loader { text-align: center; padding: 60px; color: #64748b; }
    #error-msg { background: #fee2e2; color: var(--danger); padding: 15px; border-radius: 8px; text-align: center; margin: 20px 0; display: none; }
    @media (max-width: 600px) { .stats-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>📦 Dashboard Toko Kelontong</h1>
    <p id="last-updated">Memuat data...</p>
  </header>

  <main id="dashboard" style="display:none;">
    <section class="stats-grid">
      <div class="card"><h3>✅ Stok Aman</h3><span id="stok-aman">0</span></div>
      <div class="card warning"><h3>⚠️ Stok Menipis</h3><span id="stok-menipis">0</span></div>
      <div class="card"><h3>💰 Penjualan Hari Ini</h3><span id="penjualan-hari-ini">Rp 0</span></div>
      <div class="card"><h3>📉 Pengeluaran</h3><span id="pengeluaran-total">Rp 0</span></div>
    </section>

    <section>
      <h2>📋 Barang Menipis</h2>
      <table><thead><tr><th>Kode</th><th>Nama</th><th>Stok</th></tr></thead><tbody id="body-menipis"></tbody></table>
    </section>

    <section>
      <h2>🕒 5 Transaksi Terakhir</h2>
      <table><thead><tr><th>Tanggal</th><th>Barang</th><th>Qty</th><th>Total</th></tr></thead><tbody id="body-transaksi"></tbody></table>
    </section>
  </main>

  <div id="loader">⏳ Menghubungkan ke Database...</div>
  <div id="error-msg"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
