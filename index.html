<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NovaPOS - Sistem Toko Kelontong</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-cyan: #00f2ff;
            --neon-purple: #bc13fe;
            --glass-dark: rgba(15, 17, 26, 0.82);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bg-dark: #0b0c10;
            --text-dim: #c5c6c7;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-dim);
            -webkit-font-smoothing: antialiased;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(0, 242, 255, 0.03) 0%, transparent 25%),
                radial-gradient(circle at 100% 100%, rgba(188, 19, 254, 0.03) 0%, transparent 25%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 10px; opacity: 0.5; }

        /* Glass Component */
        .glass {
            background-color: var(--glass-dark);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
        }

        .futuristic-card {
            background-color: var(--glass-dark);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 0.75rem;
            padding: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .futuristic-card:hover {
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
            border-color: rgba(0, 242, 255, 0.4);
        }

        .btn-primary {
            background-color: var(--neon-cyan);
            color: black;
            font-weight: 700;
            padding: 0.5rem 1.5rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: none;
        }

        .btn-primary:hover:not(:disabled) {
            background-color: white;
            box-shadow: 0 0 20px #00f2ff;
            transform: scale(1.02);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background-color: var(--neon-purple);
            color: white;
            font-weight: 700;
            padding: 0.5rem 1.5rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn-outline {
            border: 1px solid var(--glass-border);
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-outline:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            border: none;
        }

        /* Loading Spinner */
        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(0, 242, 255, 0.2);
            border-top-color: var(--neon-cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Animations */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-slide {
            animation: slideIn 0.3s ease;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: var(--glass-dark);
            backdrop-filter: blur(20px);
            border-left: 4px solid var(--neon-cyan);
            padding: 12px 20px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            animation: slideIn 0.3s ease;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); position: fixed; z-index: 200; transition: transform 0.3s; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0 !important; }
            .pos-layout { flex-direction: column; }
        }
    </style>
</head>
<body>

<div id="app">
    <!-- Loading Overlay -->
    <div id="loadingOverlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px;">
        <div class="spinner"></div>
        <p style="color:var(--neon-cyan)">Menghubungkan ke Database...</p>
        <p id="loadingStatus" style="font-size:12px; color:#888">Inisialisasi...</p>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" style="position:fixed; left:0; top:0; width:260px; height:100vh; background:linear-gradient(180deg, #0f111a 0%, #0b0c10 100%); border-right:1px solid var(--glass-border); z-index:100; transition:transform 0.3s; overflow-y:auto;">
        <div style="padding:24px 20px; border-bottom:1px solid var(--glass-border);">
            <div style="display:flex; align-items:center; gap:12px;">
                <div style="width:40px; height:40px; background:var(--neon-cyan); border-radius:12px; display:flex; align-items:center; justify-content:center; box-shadow:0 0 15px rgba(0,242,255,0.5);">
                    <span style="font-size:20px;">🏪</span>
                </div>
                <div>
                    <h1 style="font-size:18px; font-weight:700; color:white;">NovaPOS</h1>
                    <p style="font-size:10px; color:var(--neon-cyan); text-transform:uppercase; letter-spacing:1px;">Systems V2.0</p>
                </div>
            </div>
        </div>
        <nav style="padding:20px 16px;">
            <div style="margin-bottom:24px;">
                <p style="font-size:10px; text-transform:uppercase; letter-spacing:1px; color:#666; margin-bottom:12px; padding-left:12px;">Menu Utama</p>
                <button onclick="showView('pos')" id="nav-pos" class="nav-item" style="width:100%; display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:10px; background:none; color:#c5c6c7; cursor:pointer; margin-bottom:4px; transition:all 0.2s;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z"/></svg>
                    <span>POS Transaksi</span>
                </button>
                <button onclick="showView('products')" id="nav-products" class="nav-item" style="width:100%; display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:10px; background:none; color:#c5c6c7; cursor:pointer; margin-bottom:4px;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                    <span>Master Barang</span>
                </button>
                <button onclick="showView('customers')" id="nav-customers" class="nav-item" style="width:100%; display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:10px; background:none; color:#c5c6c7; cursor:pointer; margin-bottom:4px;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    <span>Pelanggan</span>
                </button>
                <button onclick="showView('suppliers')" id="nav-suppliers" class="nav-item" style="width:100%; display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:10px; background:none; color:#c5c6c7; cursor:pointer; margin-bottom:4px;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 18l4-4 4 4m0-8v4m4 0a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                    <span>Supplier</span>
                </button>
                <button onclick="showView('restock')" id="nav-restock" class="nav-item" style="width:100%; display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:10px; background:none; color:#c5c6c7; cursor:pointer; margin-bottom:4px;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    <span>Restock</span>
                </button>
            </div>
        </nav>
        <div style="padding:20px; margin-top:auto; border-top:1px solid var(--glass-border);">
            <div class="glass" style="padding:12px;">
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
                    <div id="dbStatusDot" style="width:8px; height:8px; border-radius:50%; background:#666;"></div>
                    <span id="dbStatusText" style="font-size:10px;">Memuat...</span>
                </div>
                <p style="font-size:10px; color:#666;">Data tersimpan di Google Sheets</p>
            </div>
        </div>
    </aside>

    <!-- Sidebar Overlay -->
    <div id="sidebarOverlay" onclick="closeSidebar()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:99;"></div>

    <!-- Main Content -->
    <main id="mainContent" style="margin-left:260px; min-height:100vh; transition:margin-left 0.3s;">
        <header style="background:var(--glass-dark); backdrop-filter:blur(20px); border-bottom:1px solid var(--glass-border); padding:16px 32px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50;">
            <div style="display:flex; align-items:center; gap:16px;">
                <button onclick="toggleSidebar()" id="menuToggle" style="display:none; background:none; border:none; cursor:pointer;">
                    <svg width="24" height="24" fill="none" stroke="white" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                </button>
                <h2 id="pageTitle" style="font-size:20px; font-weight:700; color:white;">POS Transaksi</h2>
            </div>
            <div style="display:flex; align-items:center; gap:16px;">
                <span id="currentDate" style="font-size:12px; color:#888;"></span>
            </div>
        </header>

        <div style="padding:24px 32px;">
            <!-- POS View -->
            <div id="view-pos" class="view" style="display:block;">
                <div id="pos-container" style="display:flex; gap:24px; min-height:calc(100vh - 120px);">
                    <!-- Akan diisi JS -->
                </div>
            </div>

            <!-- Products View -->
            <div id="view-products" class="view" style="display:none;">
                <div id="products-container"></div>
            </div>

            <!-- Customers View -->
            <div id="view-customers" class="view" style="display:none;">
                <div id="customers-container"></div>
            </div>

            <!-- Suppliers View -->
            <div id="view-suppliers" class="view" style="display:none;">
                <div id="suppliers-container"></div>
            </div>

            <!-- Restock View -->
            <div id="view-restock" class="view" style="display:none;">
                <div id="restock-container"></div>
            </div>
        </div>
    </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
    // ============================================
    // KONFIGURASI - GANTI DENGAN URL WEB APP ANDA
    // ============================================
    // SETELAH DEPLOY APPS SCRIPT, COPY URL NYA DISINI
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwkC8rnCnUjwgWPPj7WE3p6-3Fl36bElA_Tymjp2yTyvg09JRGtP4OyAk86k1w71-YnjA/exec';
    // ============================================

    let products = [];
    let customers = [];
    let suppliers = [];
    let transactions = [];
    let restocks = [];
    let cart = [];
    let currentView = 'pos';
    let isConnected = false;

    // API Call dengan anti-CORS strategy
    async function callAPI(action, data = null) {
        const payload = { action };
        if (data) payload.data = data;

        // Strategy 1: POST dengan text/plain (best for CORS)
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });
            
            if (response.ok) {
                const result = await response.json();
                return result;
            }
        } catch (err) {
            console.warn('POST failed, trying GET with JSONP...', err);
        }

        // Strategy 2: GET dengan callback JSONP (fallback)
        return new Promise((resolve) => {
            const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
            const script = document.createElement('script');
            
            window[callbackName] = function(result) {
                delete window[callbackName];
                document.body.removeChild(script);
                resolve(result);
            };
            
            const params = new URLSearchParams();
            params.set('action', action);
            if (data) params.set('data', JSON.stringify(data));
            params.set('callback', callbackName);
            
            script.src = `${SCRIPT_URL}?${params.toString()}`;
            script.onerror = () => {
                delete window[callbackName];
                document.body.removeChild(script);
                resolve({ success: false, error: 'Connection failed' });
            };
            document.body.appendChild(script);
        });
    }

    // Load all data from Google Sheets
    async function loadAllData() {
        updateLoadingStatus('Mengambil data produk...');
        const productsRes = await callAPI('getProducts');
        if (productsRes.success && productsRes.data) {
            products = productsRes.data;
            updateLoadingStatus(`✓ ${products.length} produk dimuat`);
        } else {
            products = [];
        }

        updateLoadingStatus('Mengambil data pelanggan...');
        const customersRes = await callAPI('getCustomers');
        if (customersRes.success && customersRes.data) {
            customers = customersRes.data;
            updateLoadingStatus(`✓ ${customers.length} pelanggan dimuat`);
        } else {
            customers = [];
        }

        updateLoadingStatus('Mengambil data supplier...');
        const suppliersRes = await callAPI('getSuppliers');
        if (suppliersRes.success && suppliersRes.data) {
            suppliers = suppliersRes.data;
            updateLoadingStatus(`✓ ${suppliers.length} supplier dimuat`);
        } else {
            suppliers = [];
        }

        updateLoadingStatus('Mengambil data transaksi...');
        const transactionsRes = await callAPI('getTransactions');
        if (transactionsRes.success && transactionsRes.data) {
            transactions = transactionsRes.data;
            updateLoadingStatus(`✓ ${transactions.length} transaksi dimuat`);
        }

        updateLoadingStatus('Mengambil data restock...');
        const restocksRes = await callAPI('getRestocks');
        if (restocksRes.success && restocksRes.data) {
            restocks = restocksRes.data;
            updateLoadingStatus(`✓ ${restocks.length} restock dimuat`);
        }

        isConnected = true;
        document.getElementById('dbStatusDot').style.background = '#10b981';
        document.getElementById('dbStatusText').innerHTML = 'Terhubung ke Google Sheets';
    }

    // Helper functions
    function formatCurrency(num) {
        return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num);
    }

    function formatDate(dateStr) {
        if (!dateStr) return '-';
        const d = new Date(dateStr);
        return d.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#00f2ff';
        toast.innerHTML = `<span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(100px)';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    function updateLoadingStatus(msg) {
        const el = document.getElementById('loadingStatus');
        if (el) el.textContent = msg;
    }

    function updateCurrentDate() {
        const now = new Date();
        document.getElementById('currentDate').textContent = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }

    function showView(view) {
        currentView = view;
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(`view-${view}`).style.display = 'block';
        
        const titles = { pos: 'POS Transaksi', products: 'Master Barang', customers: 'Data Pelanggan', suppliers: 'Data Supplier', restock: 'Restock Barang' };
        document.getElementById('pageTitle').textContent = titles[view];
        
        document.querySelectorAll('.nav-item').forEach(nav => {
            nav.style.background = 'none';
            nav.style.color = '#c5c6c7';
        });
        const activeNav = document.getElementById(`nav-${view}`);
        if (activeNav) {
            activeNav.style.background = 'rgba(0, 242, 255, 0.1)';
            activeNav.style.color = '#00f2ff';
        }
        
        if (view === 'pos') renderPOS();
        else if (view === 'products') renderProducts();
        else if (view === 'customers') renderCustomers();
        else if (view === 'suppliers') renderSuppliers();
        else if (view === 'restock') renderRestock();
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        sidebar.classList.toggle('open');
        overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
    }

    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').style.display = 'none';
    }

    // ========== POS COMPONENT ==========
    function renderPOS() {
        const container = document.getElementById('pos-container');
        container.innerHTML = `
            <div style="flex:1; display:flex; flex-direction:column; gap:20px;">
                <div class="futuristic-card" style="flex:1;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                        <h3 style="color:white; display:flex; align-items:center; gap:8px;"><span>🛒</span> Keranjang Belanja</h3>
                        <span id="cartCount" style="background:var(--neon-cyan); color:black; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:bold;">0 item</span>
                    </div>
                    <div id="cartItems" style="flex:1; overflow-y:auto; max-height:400px;"></div>
                    <div id="cartSummary" style="margin-top:20px; padding-top:20px; border-top:1px solid var(--glass-border);">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <span>Subtotal</span>
                            <span id="cartSubtotal" style="font-family:monospace;">Rp 0</span>
                        </div>
                        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                            <span style="font-weight:bold;">TOTAL</span>
                            <span id="cartTotal" style="font-size:24px; font-weight:bold; color:var(--neon-cyan); font-family:monospace;">Rp 0</span>
                        </div>
                        <div style="display:flex; gap:12px;">
                            <button onclick="clearCart()" class="btn-outline" style="flex:1;">Kosongkan</button>
                            <button onclick="processCheckout()" id="checkoutBtn" class="btn-primary" style="flex:2;" disabled>Bayar</button>
                        </div>
                    </div>
                </div>
                <div class="futuristic-card">
                    <h3 style="color:white; margin-bottom:16px;">Metode Pembayaran</h3>
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px;">
                        <button onclick="selectPayment('TUNAI')" id="pay-tunai" class="payment-method" style="padding:12px; background:rgba(0,242,255,0.1); border:1px solid var(--neon-cyan); border-radius:10px; color:var(--neon-cyan); cursor:pointer;">💵 Tunai</button>
                        <button onclick="selectPayment('QRIS')" id="pay-qris" class="payment-method" style="padding:12px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:10px; color:white; cursor:pointer;">📱 QRIS</button>
                        <button onclick="selectPayment('TRANSFER')" id="pay-transfer" class="payment-method" style="padding:12px; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:10px; color:white; cursor:pointer;">🏦 Transfer</button>
                    </div>
                </div>
            </div>
            <div style="flex:2; display:flex; flex-direction:column; gap:16px;">
                <div class="glass" style="padding:16px;">
                    <div style="position:relative;">
                        <input type="text" id="productSearch" placeholder="Cari produk (Nama / Kode)..." oninput="filterProducts()" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:10px; padding:12px 16px; color:white; outline:none;">
                    </div>
                </div>
                <div id="productGrid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(200px,1fr)); gap:16px; overflow-y:auto; max-height:calc(100vh - 280px);"></div>
            </div>
        `;
        renderCart();
        renderProductGrid();
        updateCheckoutButton();
    }

    let selectedPayment = 'TUNAI';

    function selectPayment(method) {
        selectedPayment = method;
        document.querySelectorAll('.payment-method').forEach(el => {
            el.style.background = 'rgba(255,255,255,0.05)';
            el.style.borderColor = 'var(--glass-border)';
            el.style.color = 'white';
        });
        const activeBtn = document.getElementById(`pay-${method.toLowerCase()}`);
        if (activeBtn) {
            activeBtn.style.background = 'rgba(0,242,255,0.1)';

    function addToCart(product) {
        if (product.stock <= 0) {
            showToast('Stok habis!', 'error');
            return;
        }
        const existing = cart.find(c => c.id === product.id);
        if (existing) {
            if (existing.qty >= product.stock) {
                showToast('Stok tidak mencukupi!', 'error');
                return;
            }
            existing.qty++;
            existing.subtotal = existing.qty * existing.salePrice;
        } else {
            cart.push({
                id: product.id,
                code: product.code,
                name: product.name,
                salePrice: product.salePrice,
                qty: 1,
                subtotal: product.salePrice,
                stock: product.stock
            });
        }
        renderCart();
        updateCheckoutButton();
    }

    function updateCartQty(id, delta) {
        const item = cart.find(c => c.id === id);
        if (item) {
            const newQty = item.qty + delta;
            if (newQty <= 0) {
                cart = cart.filter(c => c.id !== id);
            } else if (newQty <= item.stock) {
                item.qty = newQty;
                item.subtotal = item.qty * item.salePrice;
            } else {
                showToast('Stok tidak mencukupi!', 'error');
            }
        }
        renderCart();
        updateCheckoutButton();
    }

    function removeFromCart(id) {
        cart = cart.filter(c => c.id !== id);
        renderCart();
        updateCheckoutButton();
    }

    function clearCart() {
        cart = [];
        renderCart();
        updateCheckoutButton();
    }

    async function processCheckout() {
        if (cart.length === 0) return;
        
        const total = cart.reduce((s, c) => s + c.subtotal, 0);
        const transaction = {
            id: `TRX-${Date.now()}`,
            date: new Date().toISOString(),
            items: cart.map(c => ({
                productId: c.id,
                productCode: c.code,
                productName: c.name,
                quantity: c.qty,
                price: c.salePrice,
                subtotal: c.subtotal
            })),
            total,
            paymentMethod: selectedPayment,
            cashier: 'Admin'
        };
        
        const result = await callAPI('addTransaction', transaction);
        
        if (result.success) {
            // Update stock locally
            for (const item of cart) {
                const product = products.find(p => p.id === item.id);
                if (product) {
                    product.stock -= item.qty;
                    await callAPI('updateStock', { id: item.id, stock: product.stock });
                }
            }
            
            transactions.unshift(transaction);
            showToast(`✅ Transaksi berhasil! Total: ${formatCurrency(total)}`);
            cart = [];
            renderCart();
            renderProductGrid();
            updateCheckoutButton();
            
            // Show receipt
            alert(`📋 STRUK PEMBAYARAN\n\nNo: ${transaction.id}\nTanggal: ${formatDate(transaction.date)}\nTotal: ${formatCurrency(total)}\nBayar: ${formatCurrency(total)}\nMetode: ${selectedPayment}\n\nTerima kasih!`);
        } else {
            showToast('❌ Gagal menyimpan transaksi', 'error');
        }
    }

        `).join('');
    }

    function openSupplierModal(editId = null) {
        const supplier = editId ? suppliers.find(s => s.id == editId) : null;
        const modalHtml = `
            <div id="supplierModalOverlay" class="modal-overlay active">
                <div class="modal-content glass" style="max-width:500px; padding:24px;">
                    <h3 style="color:white; margin-bottom:20px;">${supplier ? 'Edit Supplier' : 'Tambah Supplier'}</h3>
                    <form id="supplierForm" onsubmit="saveSupplier(event)">
                        <input type="hidden" id="editSupplierId" value="${supplier ? supplier.id : ''}">
                        <div style="margin-bottom:16px;">
                            <label style="font-size:12px; color:#888;">Nama Supplier *</label>
                            <input type="text" id="supplierName" required value="${supplier ? supplier.name : ''}" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">
                        </div>
                        <div style="margin-bottom:16px;">
                            <label style="font-size:12px; color:#888;">Kontak</label>
                            <input type="text" id="supplierContact" value="${supplier ? supplier.contact || '' : ''}" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">
                        </div>
                        <div style="margin-bottom:16px;">
                            <label style="font-size:12px; color:#888;">Alamat</label>
                            <textarea id="supplierAddress" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">${supplier ? supplier.address || '' : ''}</textarea>
                        </div>
                        <div style="margin-bottom:24px;">
                            <label style="font-size:12px; color:#888;">Catatan</label>
                            <input type="text" id="supplierNotes" value="${supplier ? supplier.notes || '' : ''}" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">
                        </div>
                        <div style="display:flex; gap:12px;">
                            <button type="button" onclick="closeSupplierModal()" class="btn-outline" style="flex:1;">Batal</button>
                            <button type="submit" class="btn-primary" style="flex:2;">Simpan</button>
                        </div>
                    </form>
                </div>
            </div>
        `;
        const existing = document.getElementById('supplierModalOverlay');
        if (existing) existing.remove();
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    function closeSupplierModal() {
        const modal = document.getElementById('supplierModalOverlay');
        if (modal) modal.remove();
    }

    async function saveSupplier(e) {
        e.preventDefault();
        const editId = document.getElementById('editSupplierId').value;
        const supplierData = {
            name: document.getElementById('supplierName').value,
            contact: document.getElementById('supplierContact').value,
            address: document.getElementById('supplierAddress').value,
            notes: document.getElementById('supplierNotes').value
        };
        
        let result;
        if (editId) {
            supplierData.id = editId;
            result = await callAPI('updateSupplier', supplierData);
        } else {
            result = await callAPI('addSupplier', supplierData);
        }
        
        if (result.success) {
            showToast(editId ? 'Supplier diperbarui' : 'Supplier ditambahkan');
            await loadAllData();
            renderSuppliersList();
            closeSupplierModal();
        } else {
            showToast('Gagal menyimpan', 'error');
        }
    }

    async function deleteSupplier(id) {
        if (confirm('Yakin ingin menghapus supplier ini?')) {
            const result = await callAPI('deleteSupplier', { id });
            if (result.success) {
                showToast('Supplier dihapus');
                await loadAllData();
                renderSuppliersList();
            } else {
                showToast('Gagal menghapus', 'error');
            }
        }
    }

    function editSupplier(id) {
        openSupplierModal(id);
    }

    // ========== RESTOCK COMPONENT ==========
    function renderRestock() {
        const container = document.getElementById('restock-container');
        container.innerHTML = `
            <div class="futuristic-card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h3 style="color:white;">📦 Riwayat Restock</h3>
                    <button class="btn-primary" onclick="openRestockModal()">+ Restock Barang</button>
                </div>
                <div style="overflow-x:auto;">
                    <table style="width:100%; border-collapse:collapse;">
                        <thead>
                            <tr style="border-bottom:1px solid var(--glass-border);">
                                <th style="padding:12px; text-align:left;">Tanggal</th>
                                <th style="padding:12px; text-align:left;">Produk</th>
                                <th style="padding:12px; text-align:left;">Jumlah</th>
                                <th style="padding:12px; text-align:left;">Harga Beli</th>
                                <th style="padding:12px; text-align:left;">Total Modal</th>
                                <th style="padding:12px; text-align:left;">Supplier</th>
                            </tr>
                        </thead>
                        <tbody id="restocksList"></tbody>
                    </table>
                </div>
            </div>
        `;
        renderRestocksList();
    }

    function renderRestocksList() {
        const tbody = document.getElementById('restocksList');
        if (!tbody) return;
        
        if (restocks.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="padding:40px; text-align:center; color:#666;">Belum ada riwayat restock</td></tr>';
            return;
        }
        
        tbody.innerHTML = restocks.map(r => `
            <tr style="border-bottom:1px solid var(--glass-border);">
                <td style="padding:12px;">${formatDate(r.timestamp)}</td>
                <td style="padding:12px;">${r.productName || '-'}</td>
                <td style="padding:12px;">${r.quantity}</td>
                <td style="padding:12px;">${formatCurrency(r.purchasePrice)}</td>
                <td style="padding:12px; color:var(--neon-cyan);">${formatCurrency(r.totalModal)}</td>
                <td style="padding:12px;">${r.supplierName || '-'}</td>
            </tr>
        `).join('');
    }

    function openRestockModal() {
        const modalHtml = `
            <div id="restockModalOverlay" class="modal-overlay active">
                <div class="modal-content glass" style="max-width:500px; padding:24px;">
                    <h3 style="color:white; margin-bottom:20px;">Restock Barang</h3>
                    <form id="restockForm" onsubmit="saveRestock(event)">
                        <div style="margin-bottom:16px;">
                            <label style="font-size:12px; color:#888;">Pilih Produk *</label>
                            <select id="restockProductId" required style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">
                                <option value="">-- Pilih Produk --</option>
                                ${products.map(p => `<option value="${p.id}">${p.code || ''} - ${p.name} (Stok: ${p.stock})</option>`).join('')}
                            </select>
                        </div>
                        <div style="margin-bottom:16px;">
                            <label style="font-size:12px; color:#888;">Pilih Supplier</label>
                            <select id="restockSupplierId" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">
                                <option value="">-- Pilih Supplier --</option>
                                ${suppliers.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
                            </select>
                        </div>
                        <div style="margin-bottom:16px;">
                            <label style="font-size:12px; color:#888;">Jumlah Masuk *</label>
                            <input type="number" id="restockQuantity" required min="1" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">
                        </div>
                        <div style="margin-bottom:16px;">
                            <label style="font-size:12px; color:#888;">Harga Beli Satuan *</label>
                            <input type="number" id="restockPrice" required min="0" step="100" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">
                        </div>
                        <div style="margin-bottom:24px;">
                            <label style="font-size:12px; color:#888;">Catatan</label>
                            <input type="text" id="restockNotes" style="width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--glass-border); border-radius:8px; padding:10px; color:white;">
                        </div>
                        <div style="display:flex; gap:12px;">
                            <button type="button" onclick="closeRestockModal()" class="btn-outline" style="flex:1;">Batal</button>
                            <button type="submit" class="btn-primary" style="flex:2;">Proses Restock</button>
                        </div>
                    </form>
                </div>
            </div>
        `;
        const existing = document.getElementById('restockModalOverlay');
        if (existing) existing.remove();
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    function closeRestockModal() {
        const modal = document.getElementById('restockModalOverlay');
        if (modal) modal.remove();
    }

    async function saveRestock(e) {
        e.preventDefault();
        const productId = document.getElementById('restockProductId').value;
        const supplierId = document.getElementById('restockSupplierId').value;
        const quantity = parseInt(document.getElementById('restockQuantity').value);
        const purchasePrice = parseInt(document.getElementById('restockPrice').value);
        const notes = document.getElementById('restockNotes').value;
        
        const product = products.find(p => p.id == productId);
        if (!product) {
            showToast('Produk tidak ditemukan', 'error');
            return;
        }
        
        const supplier = suppliers.find(s => s.id == supplierId);
        
        const restockData = {
            productId: productId,
            productName: product.name,
            quantity: quantity,
            purchasePrice: purchasePrice,
            totalModal: quantity * purchasePrice,
            supplierId: supplierId,
            supplierName: supplier ? supplier.name : '',
            notes: notes
        };
        
        const result = await callAPI('addRestock', restockData);
        
        if (result.success) {
            // Update stok produk
            const newStock = product.stock + quantity;
            await callAPI('updateStock', { id: productId, stock: newStock });
            
            showToast(`✓ Restock ${quantity} ${product.unit} berhasil!`);
            await loadAllData();
            renderProductsList();
            renderProductGrid();
            renderRestocksList();
            closeRestockModal();
        } else {
            showToast('Gagal menyimpan restock', 'error');
        }
    }

    // ========== INITIALIZATION ==========
    async function init() {
        updateCurrentDate();
        setInterval(updateCurrentDate, 60000);
        
        await loadAllData();
        
        // Set responsive
        if (window.innerWidth <= 768) {
            document.getElementById('menuToggle').style.display = 'block';
            document.getElementById('mainContent').style.marginLeft = '0';
        }
        
        document.getElementById('loadingOverlay').style.display = 'none';
        showView('pos');
    }

    window.addEventListener('resize', () => {
        if (window.innerWidth <= 768) {
            document.getElementById('menuToggle').style.display = 'block';
            document.getElementById('mainContent').style.marginLeft = '0';
        } else {
            document.getElementById('menuToggle').style.display = 'none';
            document.getElementById('mainContent').style.marginLeft = '260px';
            closeSidebar();
        }
    });
    
    init();
</script>
</body>
</html>
